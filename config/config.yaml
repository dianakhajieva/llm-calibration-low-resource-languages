# ---------------------------------------------------------------------------
# Multilingual LLM Calibration Project Configuration
#
# Central configuration file for all experiments.
# All scripts should read settings from here instead of hardcoding values.
# ---------------------------------------------------------------------------

experiment:
  name: multilingual_calibration
  version: v1

# ---------------------------------------------------------------------------
# Reproducibility
# ---------------------------------------------------------------------------

seed: 42

# Number of aligned questions used in evaluation.
sample_size: 500

# ---------------------------------------------------------------------------
# Dataset
# ---------------------------------------------------------------------------

dataset:
  name: Belebele

languages:
  - code: eng_Latn
    name: English

  - code: rus_Cyrl
    name: Russian

  - code: uzn_Latn
    name: Uzbek

# ---------------------------------------------------------------------------
# Models
#
# provider:
#   openai
#   google
#   anthropic
#   huggingface
#
# supports_logprobs:
#   Whether the provider allows extracting token probabilities.
# ---------------------------------------------------------------------------

models:

  # - id: gpt-4o
  #   provider: openai
  #   model_name: gpt-4o
  #   supports_logprobs: true

  # - id: gemini
  #   provider: google
  #   model_name: gemini-2.5-flash
  #   supports_logprobs: false

  # - id: claude
  #   provider: anthropic
  #   model_name: claude-3-5-sonnet-latest
  #   supports_logprobs: false

  # - id: qwen2.5-7b
  #   provider: huggingface
  #   model_name: Qwen/Qwen2.5-7B-Instruct
  #   supports_logprobs: true

  # - id: aya-expanse-8b
  #   provider: huggingface
  #   model_name: CohereForAI/aya-expanse-8B
  #   supports_logprobs: true

  - id: dummy
    provider: dummy
    model_name: dummy
    supports_logprobs: false

# ---------------------------------------------------------------------------
# Confidence Extraction Methods
# ---------------------------------------------------------------------------

methods:
  - verbalized
  - logprob

# ---------------------------------------------------------------------------
# Prompt Configuration
# ---------------------------------------------------------------------------

prompt:
  template: standard

# ---------------------------------------------------------------------------
# Generation Settings
# ---------------------------------------------------------------------------

generation:
  temperature: 0.0
  max_new_tokens: 256

# ---------------------------------------------------------------------------
# File Paths
# ---------------------------------------------------------------------------

paths:
  sample_file: data/sample/sample_500.csv

  raw_outputs_dir: results/raw_outputs

  processed_results: results/processed/results.csv

  figures_dir: results/figures

# ---------------------------------------------------------------------------
# Output Format
# ---------------------------------------------------------------------------

output_columns:
  - question_id
  - language
  - model
  - method
  - predicted_answer
  - confidence
  - correct_answer
  - is_correct